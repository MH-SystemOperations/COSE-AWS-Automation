AWSTemplateFormatVersion: '2010-09-09'
Description: 'COSE Standard Pattern: Lambda Execution Role with Least Privilege'

Parameters:
  RoleName:
    Type: String
    Description: 'Name of the IAM role'

  Application:
    Type: String
    Description: 'Application name (lowercase, kebab-case)'
    AllowedPattern: '^[a-z0-9-]+$'

  Environment:
    Type: String
    Default: 'prod'
    AllowedValues: ['dev', 'qa', 'stage', 'prod', 'sandbox', 'unknown']

  BusinessUnit:
    Type: String
    Default: 'cose'
    AllowedValues: ['platform-engineering', 'product-engineering', 'data-analytics', 'cose', 'security', 'service-desk', 'unknown']

Resources:
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      Description: !Sub 'Lambda execution role for ${ApplicationTag}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                'aws:SourceAccount': !Ref 'AWS::AccountId'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Tags:
        - Key: mh:application
          Value: !Ref Application
        - Key: mh:environment
          Value: !Ref Environment
        - Key: mh:business-unit
          Value: !Ref BusinessUnit
        - Key: mh:managed-by
          Value: cloudformation

Outputs:
  RoleArn:
    Value: !GetAtt LambdaRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RoleArn'
  RoleName:
    Value: !Ref LambdaRole
    Export:
      Name: !Sub '${AWS::StackName}-RoleName'

# COSE Standard: All IAM roles MUST have:
# - Description explaining purpose
# - Condition on SourceAccount (prevent confused deputy)
# - Only necessary managed policies (start with Basic, add as needed)
# - Standard tags
# - Explicit trust policy (no wildcards)
#
# To add custom policies: Create separate AWS::IAM::Policy resource
# and attach to this role. Keep policies in separate files for reusability.
