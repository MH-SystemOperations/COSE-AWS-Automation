AWSTemplateFormatVersion: '2010-09-09'
Description: 'COSE Standard Pattern: Secure DynamoDB Table'

Parameters:
  TableName:
    Type: String
    Description: 'Name of the DynamoDB table'

  Application:
    Type: String
    Description: 'Application name (lowercase, kebab-case)'
    AllowedPattern: '^[a-z0-9-]+$'

  Environment:
    Type: String
    Default: 'prod'
    AllowedValues: ['dev', 'qa', 'stage', 'prod', 'sandbox', 'unknown']
    Description: 'Environment'

  BusinessUnit:
    Type: String
    Default: 'cose'
    AllowedValues: ['platform-engineering', 'product-engineering', 'data-analytics', 'cose', 'security', 'service-desk', 'unknown']
    Description: 'Owning business unit'

Resources:
  Table:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PrimaryKey
          AttributeType: S
      KeySchema:
        - AttributeName: PrimaryKey
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      Tags:
        - Key: mh:application
          Value: !Ref Application
        - Key: mh:environment
          Value: !Ref Environment
        - Key: mh:business-unit
          Value: !Ref BusinessUnit
        - Key: mh:managed-by
          Value: cloudformation

Outputs:
  TableName:
    Value: !Ref Table
    Export:
      Name: !Sub '${AWS::StackName}-TableName'
  TableArn:
    Value: !GetAtt Table.Arn
    Export:
      Name: !Sub '${AWS::StackName}-TableArn'

# COSE Standard: All DynamoDB tables MUST have:
# - Encryption at rest (KMS)
# - Point-in-time recovery enabled
# - PAY_PER_REQUEST billing (no provisioned capacity)
# - Standard tags (Owner, Department, Application, Environment, CreatedBy, ManagedBy)
