AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Role for GitHub Actions to deploy IAM Identity Center permission sets'

Parameters:
  GitHubOrg:
    Type: String
    Default: 'MH-SystemOperations'
    Description: GitHub organization name
  GitHubRepo:
    Type: String
    Default: 'COSE-AWS-Automation'
    Description: GitHub repository name

Resources:
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: GitHubActionsDeployRole
      Description: 'Allows GitHub Actions to deploy IAM Identity Center permission sets'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub 'arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com'
            Action: 'sts:AssumeRoleWithWebIdentity'
            Condition:
              StringEquals:
                'token.actions.githubusercontent.com:aud': 'sts.amazonaws.com'
              StringLike:
                'token.actions.githubusercontent.com:sub': !Sub 'repo:${GitHubOrg}/${GitHubRepo}:*'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Policies:
        - PolicyName: DeployPermissionSets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ManagePermissionSetStacks
                Effect: Allow
                Action:
                  - 'cloudformation:CreateStack'
                  - 'cloudformation:UpdateStack'
                  - 'cloudformation:DeleteStack'
                  - 'cloudformation:DescribeStacks'
                  - 'cloudformation:DescribeStackEvents'
                  - 'cloudformation:DescribeStackResources'
                  - 'cloudformation:GetTemplate'
                  - 'cloudformation:ValidateTemplate'
                Resource:
                  - !Sub 'arn:aws:cloudformation:us-east-1:${AWS::AccountId}:stack/MH-Engineer-PermissionSet/*'
                  - !Sub 'arn:aws:cloudformation:us-east-1:${AWS::AccountId}:stack/MH-Lead-PermissionSet/*'
                  - !Sub 'arn:aws:cloudformation:us-east-1:${AWS::AccountId}:stack/MH-Security-PermissionSet/*'
                  - !Sub 'arn:aws:cloudformation:us-east-1:${AWS::AccountId}:stack/MH-Engineer-Guardrails/*'

              - Sid: ManagePermissionSets
                Effect: Allow
                Action:
                  - 'sso-admin:CreatePermissionSet'
                  - 'sso-admin:UpdatePermissionSet'
                  - 'sso-admin:DeletePermissionSet'
                  - 'sso-admin:DescribePermissionSet'
                  - 'sso-admin:PutInlinePolicyToPermissionSet'
                  - 'sso-admin:DeleteInlinePolicyFromPermissionSet'
                  - 'sso-admin:AttachManagedPolicyToPermissionSet'
                  - 'sso-admin:DetachManagedPolicyFromPermissionSet'
                  - 'sso-admin:AttachCustomerManagedPolicyReferenceToPermissionSet'
                  - 'sso-admin:DetachCustomerManagedPolicyReferenceFromPermissionSet'
                  - 'sso-admin:ProvisionPermissionSet'
                  - 'sso-admin:ListManagedPoliciesInPermissionSet'
                  - 'sso-admin:ListCustomerManagedPolicyReferencesInPermissionSet'
                  - 'sso-admin:TagResource'
                  - 'sso-admin:UntagResource'
                Resource: '*'

              - Sid: ManageGuardrailsPolicy
                Effect: Allow
                Action:
                  - 'iam:CreatePolicy'
                  - 'iam:DeletePolicy'
                  - 'iam:CreatePolicyVersion'
                  - 'iam:DeletePolicyVersion'
                  - 'iam:SetDefaultPolicyVersion'
                  - 'iam:GetPolicy'
                  - 'iam:GetPolicyVersion'
                  - 'iam:ListPolicyVersions'
                Resource:
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:policy/MH-Engineer-Guardrails'

              - Sid: PassRoleForCloudFormation
                Effect: Allow
                Action:
                  - 'iam:PassRole'
                Resource: '*'
                Condition:
                  StringEquals:
                    'iam:PassedToService': 'cloudformation.amazonaws.com'

  # GitHubOIDCProvider already exists - using existing provider
  # If it doesn't exist in your account, uncomment this resource:
  # GitHubOIDCProvider:
  #   Type: AWS::IAM::OIDCProvider
  #   Properties:
  #     Url: https://token.actions.githubusercontent.com
  #     ClientIdList:
  #       - sts.amazonaws.com
  #     ThumbprintList:
  #       - 6938fd4d98bab03faadb97b34396831e3780aea1

Outputs:
  RoleArn:
    Description: ARN of the GitHub Actions deployment role
    Value: !GetAtt GitHubActionsRole.Arn
    Export:
      Name: GitHubActionsDeployRoleArn
